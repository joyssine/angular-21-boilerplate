<div class="card-header py-3 bg-white border-bottom">
    <h4 class="mb-0 fw-bold text-center">Account Login</h4>
</div>

<div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label class="form-label">Email Address</label>

            <input
                type="text"
                formControlName="email"
                class="form-control"
                placeholder="email@example.com"
                [ngClass]="{ 'is-invalid': submitted && f.email.errors }"
            />

            <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
                <div *ngIf="f.email.errors.required">Email is required</div>
                <div *ngIf="f.email.errors.email">Email must be a valid email address</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>

            <input
                type="password"
                formControlName="password"
                class="form-control"
                placeholder="Enter your password"
                [ngClass]="{ 'is-invalid': submitted && f.password.errors }"
            />

            <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                <div *ngIf="f.password.errors.required">Password is required</div>
            </div>
        </div>

        <div class="d-grid gap-2">
            <button [disabled]="loading" class="btn btn-primary btn-lg shadow-sm">
                <span
                    *ngIf="loading"
                    class="spinner-border spinner-border-sm me-2"
                ></span>
                Sign In
            </button>
        </div>

        <div class="mt-4 text-center">
            <p class="text-muted small">Don't have an account? 
                <a routerLink="../register" class="text-primary text-decoration-none fw-bold">Register here</a>
            </p>
            <a routerLink="../forgot-password" class="text-secondary small text-decoration-none">
                Forgot your password?
            </a>
        </div>

    </form>
</div>
